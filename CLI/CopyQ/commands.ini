[Commands]
1\Name=Paste Current Date
1\Command="
    copyq:
    var format = 'yyyy-MM-dd'
    copy(dateString(format))
    paste()
    hide()"
1\InMenu=true
1\Icon=\xf073
1\GlobalShortcut=meta+ctrl+d, DISABLED
2\Name=Insert current time
2\Command="
    copyq:
    var format = 'HH:mm'
    copy(dateString(format))
    paste()
    hide()"
2\Input=text/plain
2\InMenu=true
2\Icon=\xf017
3\Name=Paste as Plain Text
3\Command="
    copyq:
    var text = input()
    copy(text)
    copySelection(text)
    paste()"
3\Input=text/plain
3\InMenu=true
3\HideWindow=true
3\Icon=\xf0ea
3\Shortcut=shift+return
4\Name=Show/hide main window
4\Command=copyq: toggle()
4\Icon=\xf022
4\GlobalShortcut=ctrl+`
size=4

