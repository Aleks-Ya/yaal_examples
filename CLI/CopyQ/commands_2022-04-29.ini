2\Command="
    copyq:
    if (monitoring())
        disable()
    else
        enable()"
2\GlobalShortcut=ctrl+shift+x
2\Icon=\xf15b
2\InMenu=true
2\IsGlobalShortcut=true
2\Name=Toggle Clipboard Storing
3\Command="
    copyq:
    var text = input()
    copy(text)
    copySelection(text)
    paste()"
3\HideWindow=true
3\Icon=\xf0ea
3\InMenu=true
3\Input=text/plain
3\Name=Paste as Plain Text
3\Shortcut=shift+return
4\Command="
    copyq:copy('')"
4\GlobalShortcut=ctrl+alt+backspace
4\Icon=\xf15b
4\InMenu=true
4\IsGlobalShortcut=true
4\Name=Clear Clipboard
